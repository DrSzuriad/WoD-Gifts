<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Garou Gifts</title>

  <!-- Choices.js -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css"
  />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab {
      padding: 10px 16px;
      background: #222;
      border-radius: 8px;
      cursor: pointer;
    }

    .tab.active {
      background: #444;
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 30px;
    }

    .gift-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .gift-card {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #333;
    }

    .gift-title {
      font-size: 20px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .gift-meta {
      color: #aaa;
      margin-bottom: 10px;
    }

	.gift-description {
	  line-height: 1.5;
	  white-space: pre-line;
	}

    .coming-soon {
      padding: 40px;
      text-align: center;
      color: #888;
      font-size: 24px;
    }

    .choices__inner {
      background: #222 !important;
      color: white !important;
      border: 1px solid #444 !important;
    }

    .choices__list--dropdown {
      background: #222 !important;
      color: white !important;
    }

    .choices__item {
      color: white !important;
    }
  </style>
</head>
<body>

  <h1>Garou Gifts</h1>

  <div class="tabs">
    <div class="tab active">Garou</div>
    <div class="tab">Bastet</div>
    <div class="tab">Corax</div>
    <div class="tab">Mokole</div>
  </div>

  <div id="garou-content">

    <div class="filters">
	<select id="rankSelect" multiple></select>
      <select id="breedSelect" multiple></select>
      <select id="auspiceSelect" multiple></select>
      <select id="tribeSelect" multiple></select>
      <select id="otherSelect" multiple></select>
    </div>

    <div class="gift-list" id="giftList"></div>

  </div>

  <div class="coming-soon" style="display:none;">
    Coming soon
  </div>

  <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>

<script>

  let gifts = [];

  let breedChoices;
  let auspiceChoices;
  let tribeChoices;
  let otherChoices;
  let rankChoices;

  // =========================
  // ŁADOWANIE JSON
  // =========================

  async function loadData() {

    try {

      const response = await fetch("./data/gifts_new.json");

      gifts = await response.json();

      initializeApp();

    } catch (error) {

      console.error(error);

      document.getElementById("giftList").innerHTML = `
        <div style="
          color:red;
          padding:20px;
          background:#220000;
          border-radius:12px;
        ">
          Nie udało się wczytać gifts.json
        </div>
      `;
    }
  }

  // =========================
  // INIT
  // =========================

function initializeApp() {

  const garouGifts = gifts.filter(gift =>
    gift.requirements.some(r =>
      r.race === "Garou"
    )
  );

  // BREEDS
  const breeds = [...new Set(

    garouGifts.flatMap(gift =>

      gift.requirements
        .filter(r => r.type === "Breed")
        .map(r => r.value)

    )

  )].sort();

  // AUSPICES
  const auspices = [...new Set(

    garouGifts.flatMap(gift =>

      gift.requirements
        .filter(r => r.type === "Auspice")
        .map(r => r.value)

    )

  )].sort();

  // TRIBES
  const tribes = [...new Set(

    garouGifts.flatMap(gift =>

      gift.requirements
        .filter(r => r.type === "Tribe")
        .map(r => r.value)

    )

  )].sort();

  // FACTIONS
  const others = [...new Set(

    garouGifts.flatMap(gift =>

      gift.requirements
        .filter(r =>
          r.faction_type !== "All"
        )
        .map(r => r.faction_value)

    )

  )].sort();

  const ranks = [1,2,3,4,5,6];

  breedChoices =
    fillSelect("breedSelect", breeds, "Breed");

  auspiceChoices =
    fillSelect("auspiceSelect", auspices, "Auspice");

  tribeChoices =
    fillSelect("tribeSelect", tribes, "Tribe");

  otherChoices =
    fillSelect("otherSelect", others, "Faction");

  rankChoices =
    fillSelect("rankSelect", ranks, "Rank");

  document
    .getElementById("breedSelect")
    .addEventListener("change", filterGifts);

  document
    .getElementById("auspiceSelect")
    .addEventListener("change", filterGifts);

  document
    .getElementById("tribeSelect")
    .addEventListener("change", filterGifts);

  document
    .getElementById("otherSelect")
    .addEventListener("change", filterGifts);

  document
    .getElementById("rankSelect")
    .addEventListener("change", filterGifts);

  renderGifts(garouGifts);
}

  // =========================
  // SELECTY
  // =========================

  function fillSelect(selectId, values, placeholder) {

    const select =
      document.getElementById(selectId);

    values.forEach(value => {

      const option =
        document.createElement("option");

      option.value = value;
      option.textContent = value;

      select.appendChild(option);
    });

    return new Choices(select, {
      removeItemButton: true,
      searchEnabled: true,
      placeholder: true,
      placeholderValue: placeholder
    });
  }

  // =========================
  // RENDER
  // =========================

function renderGifts(filteredGifts) {

  const container =
    document.getElementById("giftList");

  container.innerHTML = "";

  filteredGifts.forEach(gift => {

    const version = gift.versions[0];

    const requirementsText =
      gift.requirements.map(r => {

        let text =
          `${r.type}: ${r.value}`;

        if (r.faction_type !== "All") {

          text += `
            (${r.faction_type}: ${r.faction_value})
          `;
        }

        text += ` | Rank ${r.rank}`;

        return text;

      }).join("<br>");

    const card =
      document.createElement("div");

    card.className = "gift-card";

    card.innerHTML = `
      <div class="gift-title">
        ${version.names.en}
      </div>

      <div class="gift-meta">
        ${requirementsText}
        <br><br>
        ${version.book}
        ${version.edition}
      </div>

      <div class="gift-description">
        ${version.descriptions.en}
      </div>
    `;

    container.appendChild(card);
  });
}

  // =========================
  // FILTER
  // =========================

function filterGifts() {

  const selectedBreeds =
    breedChoices.getValue(true);

  const selectedAuspices =
    auspiceChoices.getValue(true);

  const selectedTribes =
    tribeChoices.getValue(true);

  const selectedOthers =
    otherChoices.getValue(true);

  const selectedRanks =
    rankChoices.getValue(true);

  const filtered = gifts.filter(gift => {

    return gift.requirements.some(r => {

      // BREED
      if (
        r.type === "Breed" &&
        selectedBreeds.length > 0 &&
        !selectedBreeds.includes(r.value)
      ) {
        return false;
      }

      // AUSPICE
      if (
        r.type === "Auspice" &&
        selectedAuspices.length > 0 &&
        !selectedAuspices.includes(r.value)
      ) {
        return false;
      }

      // TRIBE
      if (
        r.type === "Tribe" &&
        selectedTribes.length > 0 &&
        !selectedTribes.includes(r.value)
      ) {
        return false;
      }

      // FACTION
      if (
        selectedOthers.length > 0 &&
        r.faction_type !== "All" &&
        !selectedOthers.includes(r.faction_value)
      ) {
        return false;
      }

      // RANK
      if (
        selectedRanks.length > 0 &&
        !selectedRanks.includes(String(r.rank))
      ) {
        return false;
      }

      return true;
    });
  });

  const sorted = filtered.sort((a, b) => {

    const nameA =
      a.versions[0].names.en;

    const nameB =
      b.versions[0].names.en;

    return nameA.localeCompare(nameB);
  });

  renderGifts(sorted);
}

  // =========================
  // START
  // =========================

  loadData();

</script>

</body>
</html>
