<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Garou Gifts</title>

    <!-- Choices.js -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css"
    >

    <!-- Nasz CSS -->
    <link rel="stylesheet" href="css/main.css">
</head>

<body>

<h1>Garou Gifts</h1>

<div class="top-bar">

    <div class="app-version">
        Version: v0.5.8
    </div>

    <div class="language-switch">

        <label for="languageSelect">
            Language:
        </label>

        <select id="languageSelect">
            <option value="en">
                English
            </option>

            <option value="pl">
                Polski
            </option>
        </select>

    </div>

</div>

<div class="tabs">

    <div class="tab active">Garou</div>

    <div class="tab">Bastet</div>

    <div class="tab">Corax</div>

    <div class="tab">Mokole</div>

</div>

<div id="garou-content">

    <div class="filters">

        <select id="rankSelect" multiple></select>

        <select id="breedSelect" multiple></select>

        <select id="auspiceSelect" multiple></select>

        <select id="tribeSelect" multiple></select>

        <select id="otherSelect" multiple></select>

    </div>

    <div
        id="giftList"
        class="gift-list">
    </div>

</div>

<div
    class="coming-soon"
    style="display:none;">

    Coming soon

</div>

<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>

<script src="js/app.js"></script>

</body>
</html>
