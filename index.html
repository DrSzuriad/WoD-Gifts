<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Garou Gifts</title>

  <!-- Choices.js -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css"
  />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab {
      padding: 10px 16px;
      background: #222;
      border-radius: 8px;
      cursor: pointer;
    }

    .tab.active {
      background: #444;
    }

    .filters {
      display: grid;
	  grid-template-columns:
	    repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }

	.gift-list {
	  display: flex;
	  flex-direction: column;
	  gap: 20px;
	}

    .gift-card {
	  max-width: 1200px;
      background: #1e1e1e;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #333;
    }

	.gift-card select {

	  display: block;

	  width: fit-content;

	  margin-top: 10px;
	  margin-bottom: 10px;

	  padding: 4px 8px;

	  background: #222;

	  color: white;

	  border: 1px solid #444;

	  border-radius: 6px;
	}

    .gift-title {
      font-size: 20px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .gift-meta {
      color: #aaa;
      margin-bottom: 10px;
    }

	.gift-description {
	  line-height: 1.5;
	  white-space: pre-line;
	  margin-top: 0;
	}

    .coming-soon {
      padding: 40px;
      text-align: center;
      color: #888;
      font-size: 24px;
    }

    .choices__inner {
      background: #222 !important;
      color: white !important;
      border: 1px solid #444 !important;
    }

    .choices__list--dropdown {
      background: #222 !important;
      color: white !important;
    }

    .choices__item {
      color: white !important;
    }
	
	.top-bar {

      display: flex;

      justify-content: space-between;

      align-items: center;

      margin-bottom: 20px;
    }

    .app-version {

      color: #888;

      font-size: 14px;
    }

    .language-switch {

      display: flex;

      align-items: center;

      gap: 10px;
    }

    .language-switch select {

      background: #1a0000;

      color: white;

      border: 1px solid #3a0000;

      border-radius: 6px;

      padding: 6px 10px;
    }
  
	.choices__list--dropdown .choices__item--selectable.is-highlighted {
	  background: #555 !important;
	  color: white !important;
	}

	.choices__list--dropdown .choices__item--disabled {
	  background: #555 !important;
	  color: white !important;
	}

	.choices__list--multiple .choices__item {
	  background: #006d8f !important;
	  border: 1px solid #008db8 !important;
	  color: white !important;
	}
	
	.choices__list--multiple .choices__item {
	  background: #1a0000 !important;
	  border: 1px solid #3a0000 !important;
	  color: white !important;
	}
	
	.gift-table {

		  width: 100%;
		  border-collapse: collapse;

		  margin-top: 10px;
		  margin-bottom: 10px;
		}

		.gift-table th,
		.gift-table td {

		  border: 1px solid #444;
		  padding: 8px;
		  text-align: left;
		}

		.gift-table th {

		  background: #222;
		}

		.gift-table tr:nth-child(even) {

		  background: #181818;
	}
	
  </style>
</head>
<body>

  <h1>Garou Gifts</h1>

<div class="top-bar">

  <div class="app-version">
    Version: v0.5.0
  </div>

  <div class="language-switch">

    <label for="languageSelect">
      Language:
    </label>

    <select id="languageSelect">

      <option value="en">
        English
      </option>

      <option value="pl">
        Polski
      </option>

    </select>

  </div>

</div>

  <div class="tabs">
    <div class="tab active">Garou</div>
    <div class="tab">Bastet</div>
    <div class="tab">Corax</div>
    <div class="tab">Mokole</div>
  </div>

  <div id="garou-content">

    <div class="filters">
	<select id="rankSelect" multiple></select>
      <select id="breedSelect" multiple></select>
      <select id="auspiceSelect" multiple></select>
      <select id="tribeSelect" multiple></select>
      <select id="otherSelect" multiple></select>
    </div>

    <div class="gift-list" id="giftList"></div>

  </div>

  <div class="coming-soon" style="display:none;">
    Coming soon
  </div>

  <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>

<script>

  let gifts = [];

  let breedChoices;
  let auspiceChoices;
  let tribeChoices;
  let otherChoices;
  let rankChoices;

  let currentLanguage = "en";

  // =========================
  // ŁADOWANIE JSON
  // =========================

  async function loadData() {

    try {

      const response = await fetch("./data/gifts.json");

      gifts = await response.json();

      initializeApp();

    } catch (error) {

      console.error(error);

      document.getElementById("giftList").innerHTML = `
        <div style="
          color:red;
          padding:20px;
          background:#220000;
          border-radius:12px;
        ">
          Nie udało się wczytać gifts.json
        </div>
      `;
    }
  }

  // =========================
  // INIT
  // =========================

function filterGifts() {

  const selectedBreeds =
    breedChoices.getValue(true);

  const selectedAuspices =
    auspiceChoices.getValue(true);

  const selectedTribes =
    tribeChoices.getValue(true);

  const selectedOthers =
    otherChoices.getValue(true);

  const selectedRanks =
    rankChoices.getValue(true);

  // aktywne typy filtrów
  const activeTypes = [];

  if (selectedBreeds.length > 0) {
    activeTypes.push("Breed");
  }

  if (selectedAuspices.length > 0) {
    activeTypes.push("Auspice");
  }

  if (selectedTribes.length > 0) {
    activeTypes.push("Tribe");
  }

  const filtered = gifts.filter(gift => {

    // =========================
    // BRAK FILTRÓW TYPU
    // =========================

    if (activeTypes.length === 0) {

      // jeśli jest rank
      if (selectedRanks.length > 0) {

        return gift.requirements.some(r =>

          selectedRanks.includes(
            String(r.rank)
          )
        );
      }

      // brak filtrów = pokaż wszystko
      return true;
    }

    for (const r of gift.requirements) {

      // =========================
      // RANK (zawsze działa)
      // =========================

      if (
        selectedRanks.length > 0 &&
        !selectedRanks.includes(
          String(r.rank)
        )
      ) {
        continue;
      }

      // =========================
      // ignoruj nieaktywne typy
      // =========================

      if (
        activeTypes.length > 0 &&
        !activeTypes.includes(r.type)
      ) {
        continue;
      }

      // =========================
      // BREED
      // =========================

      if (
        r.type === "Breed" &&
        selectedBreeds.includes(r.value)
      ) {
        return true;
      }

      // =========================
      // AUSPICE
      // =========================

      if (
        r.type === "Auspice" &&
        selectedAuspices.includes(r.value)
      ) {
        return true;
      }

      // =========================
      // TRIBE
      // =========================

      if (
        r.type === "Tribe" &&
        selectedTribes.includes(r.value)
      ) {

        // faction filtering

        if (selectedOthers.length > 0) {

          // ONLY ALL

          if (
            selectedOthers.includes("All")
          ) {

            if (
              r.faction_type !== "All"
            ) {
              continue;
            }

          } else {

            // konkretne faction

            if (
              r.faction_type === "All"
            ) {
              continue;
            }

            if (
              !selectedOthers.includes(
                r.faction_value
              )
            ) {
              continue;
            }
          }
        }

        return true;
      }
    }

    return false;
  });

  // SORT
  sortGifts(filtered);

  renderGifts(filtered);
}

  // =========================
  // RENDER
  // =========================


function getLocalizedText(obj) {

  if (!obj) {
    return "";
  }

  return (
    obj[currentLanguage] ||
    obj.en ||
    ""
  );
}

function renderGifts(filteredGifts) {

  const container =
    document.getElementById("giftList");

  container.innerHTML = "";

  filteredGifts.forEach((gift, index) => {

    const defaultVersion =
      gift.versions[0];

    const requirementsText =
      gift.requirements.map(r => {

        let text =
          `${r.type}: ${r.value}`;

        if (r.faction_type !== "All") {

          text +=
            ` (${r.faction_type}: ${r.faction_value})`;
        }

        text += ` | Rank ${r.rank}`;

        return text;

      }).join("<br>");

    const card =
      document.createElement("div");

    card.className = "gift-card";

    // unique ids
    const titleId =
      `gift-title-${index}`;

    const metaId =
      `gift-meta-${index}`;

    const descId =
      `gift-desc-${index}`;

    const selectId =
      `gift-version-${index}`;

	card.innerHTML = `

	  <div class="gift-title"
		   id="${titleId}">
		${[...new Set(

		  gift.requirements
			.map(r => getLocalizedText(r.names))

		)].join(" / ")}
	  </div>

	  <div class="gift-meta">
		${requirementsText}
	  </div>

	  <select id="${selectId}">
		${gift.versions.map((v, i) => `

		  <option value="${i}">
			${v.book}
			${v.edition
			  ? ` (${v.edition})`
			  : ""}
		  </option>

		`).join("")}
	  </select>

	  <div id="${descId}">
		${renderContent(defaultVersion)}
	  </div>

	`;

	container.appendChild(card);

    // =========================
    // VERSION SWITCHING
    // =========================

    const select =
      document.getElementById(selectId);

    select.addEventListener("change", e => {

      const versionIndex =
        Number(e.target.value);

      const version =
        gift.versions[versionIndex];


	document.getElementById(descId)
	  .innerHTML =
		renderContent(version);
    });
  });
}

function updateFactionOptions() {

  const selectedTribes =
    tribeChoices.getValue(true);

  const otherSelect =
    document.getElementById("otherSelect");

  // czyścimy select
  if (otherChoices) {
    otherChoices.destroy();
  }

  otherSelect.innerHTML = "";

  let factionValues = [];

  // jeśli wybrano tribe
  if (selectedTribes.length > 0) {

    factionValues = [...new Set(

      gifts.flatMap(gift =>

        gift.requirements
          .filter(r =>

            r.type === "Tribe" &&
            selectedTribes.includes(r.value) &&
            r.faction_type !== "All"

          )
          .map(r => r.faction_value)

      )

    )];

	} else {

	  // brak tribe = brak faction
	  factionValues = [];
	}

	factionValues = [
	  "All",
	  ...factionValues.sort()
	];

  otherChoices = new Choices(otherSelect, {
    removeItemButton: true,
    searchEnabled: true,
    placeholder: true,
    placeholderValue: "Faction"
  });

  factionValues.forEach(value => {

    otherChoices.setChoices([
      {
        value: value,
        label: value,
        selected: false
      }
    ], "value", "label", false);

  });
}

function initializeApp() {

  const garouGifts = gifts.filter(gift =>
    gift.requirements.some(r =>
      r.race === "Garou"
    )
  );

  // BREEDS
  const breeds = [...new Set(

    garouGifts.flatMap(gift =>

      gift.requirements
        .filter(r => r.type === "Breed")
        .map(r => r.value)

    )

  )].sort();

  // AUSPICES
  const auspices = [...new Set(

    garouGifts.flatMap(gift =>

      gift.requirements
        .filter(r => r.type === "Auspice")
        .map(r => r.value)

    )

  )].sort();

  // TRIBES
  const tribes = [...new Set(

    garouGifts.flatMap(gift =>

      gift.requirements
        .filter(r => r.type === "Tribe")
        .map(r => r.value)

    )

  )].sort();

  const ranks = [1,2,3,4,5,6];

  breedChoices =
    fillSelect("breedSelect", breeds, "Breed");

  auspiceChoices =
    fillSelect("auspiceSelect", auspices, "Auspice");

  tribeChoices =
    fillSelect("tribeSelect", tribes, "Tribe");

  updateFactionOptions();

  rankChoices =
    fillSelect("rankSelect", ranks, "Rank");
	
  document
    .getElementById("breedSelect")
    .addEventListener("change", () => {
		  saveSettings();
		  filterGifts();
		});

  document
    .getElementById("auspiceSelect")
    .addEventListener("change", () => {
		  saveSettings();
		  filterGifts();
		});

	document
	  .getElementById("tribeSelect")
	  .addEventListener("change", () => {
		updateFactionOptions();
		saveSettings();
		filterGifts();
	  });

  document
    .getElementById("otherSelect")
    .addEventListener("change", () => {
		  saveSettings();
		  filterGifts();
		});

  document
    .getElementById("rankSelect")
    .addEventListener("change", () => {
		  saveSettings();
		  filterGifts();
		});

	document
	  .getElementById("languageSelect")
	  .addEventListener("change", e => {

		currentLanguage = e.target.value;

		saveSettings();

		filterGifts();
	  });
	
  sortGifts(garouGifts);

  renderGifts(garouGifts);
  
  loadSettings();

  restoreSelections();
  
}

function fillSelect(
  elementId,
  values,
  placeholder
) {

  const element =
    document.getElementById(elementId);

  const choices =
    new Choices(element, {

      removeItemButton: true,

      searchEnabled: true,

      placeholder: true,

      placeholderValue: placeholder
    });

  choices.setChoices(

    values.map(value => ({
      value: String(value),
      label: String(value),
      selected: false
    })),

    "value",
    "label",
    false
  );

  return choices;
}

function sortGifts(giftsArray) {

  return giftsArray.sort((a, b) => {

    const rankA =
      Math.min(
        ...a.requirements.map(r => r.rank)
      );

    const rankB =
      Math.min(
        ...b.requirements.map(r => r.rank)
      );

    if (rankA !== rankB) {
      return rankA - rankB;
    }

    const nameA =
      [...new Set(

        a.requirements
          .map(r => getLocalizedText(r.names))

      )].join(" / ");

    const nameB =
      [...new Set(

        b.requirements
          .map(r => getLocalizedText(r.names))

      )].join(" / ");

    return nameA.localeCompare(
      nameB,
      currentLanguage
    );
  });
}

function renderContent(version) {

  if (!version.content) {
    return `
      <div class="gift-description">
        ${getLocalizedText(version.descriptions)}
      </div>
    `;
  }

  let html = "";

  for (const block of version.content) {

    if (block.type === "text") {

      html += `
        <div class="gift-description">
          ${getLocalizedText(block)}
        </div>
      `;
    }

    if (block.type === "table") {

      const headers =
        block.headers[currentLanguage] ||
        block.headers.en ||
        [];

      html += `
        <table class="gift-table">

          <thead>
            <tr>
              ${headers
                .map(h => `<th>${h}</th>`)
                .join("")}
            </tr>
          </thead>

          <tbody>

            ${block.rows.map(row => {

              const cells =
                row[currentLanguage] ||
                row.en ||
                [];

              return `
                <tr>
                  ${cells
                    .map(cell => `<td>${cell}</td>`)
                    .join("")}
                </tr>
              `;
            }).join("")}

          </tbody>

        </table>
      `;
    }
  }

  return html;
}

function saveSettings() {

  const settings = {

    language:
      currentLanguage,

    breed:
      breedChoices.getValue(true),

    auspice:
      auspiceChoices.getValue(true),

    tribe:
      tribeChoices.getValue(true),

    faction:
      otherChoices.getValue(true),

    rank:
      rankChoices.getValue(true)
  };

  localStorage.setItem(
    "garou-gifts-settings",
    JSON.stringify(settings)
  );
}

function loadSettings() {

  const raw =
    localStorage.getItem(
      "garou-gifts-settings"
    );

  if (!raw) {
    return;
  }

  const settings =
    JSON.parse(raw);

  currentLanguage =
    settings.language || "en";

  document.getElementById(
    "languageSelect"
  ).value = currentLanguage;
}

function restoreSelections() {

  const raw =
    localStorage.getItem(
      "garou-gifts-settings"
    );

  if (!raw) {
    return;
  }

  const settings =
    JSON.parse(raw);

  breedChoices.setChoiceByValue(
    settings.breed || []
  );

  auspiceChoices.setChoiceByValue(
    settings.auspice || []
  );

  tribeChoices.setChoiceByValue(
    settings.tribe || []
  );

  updateFactionOptions();

  otherChoices.setChoiceByValue(
    settings.faction || []
  );

  rankChoices.setChoiceByValue(
    settings.rank || []
  );

  filterGifts();
}

  // =========================
  // START
  // =========================

  loadData();

</script>

</body>
</html>
